<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>text animation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Gravitas+One&family=Lobster&family=Roboto+Slab:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
</head>

<body>
  <svg width="300" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">

    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#b1dcf1" />
        <stop offset="100%" stop-color="#7dc4e8" />
      </linearGradient>
      <pattern id="stripes" width="20" height="200" patternUnits="userSpaceOnUse">
        <rect width="10" height="200" fill="#7dc4e8" />
        <rect x="10" width="10" height="200" fill="#b1dcf1" />
      </pattern>
      <pattern id="redDots" width="12" height="12" patternUnits="userSpaceOnUse">
        <rect width="12" height="12" fill="#ff401a" />
        <circle cx="6" cy="6" r="2" fill="#ffffff" />
      </pattern>

    </defs>
    <rect width="300" height="200" fill="url(#bg)" />
    <rect width="300" height="200" fill="url(#stripes)" opacity="0.6" />
    <text x="155" y="75" text-anchor="middle" font-family="Lobster, cursive" font-size="35" font-weight="bold"
      fill="#999999" opacity="0.5">
      the Breaking
    </text>
    <text x="150" y="70" text-anchor="middle" font-family="Lobster, cursive" font-size="35" font-weight="bold"
      fill="#f4b400" stroke="#ffffff" stroke-width="0.1">
      the Breaking
    </text>

    <text x="155" y="155" text-anchor="middle" font-family="Lobster, cursive" font-size="60" font-weight="bold"
      fill="#999999" opacity="0.5">
      Bad
    </text>
    <text x="150" y="150" text-anchor="middle" font-family="Lobster, cursive" font-size="60" font-weight="400"
      fill="url(#redDots)" stroke="#ffffff" stroke-width="2.5" paint-order="stroke fill">
      Bad
    </text>
  </svg>
</body>

</html>
